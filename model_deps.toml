# Model-specific pip dependencies.
# Keys are lowercase patterns matched against model names.
# Values are lists of pip packages to install.

[kokoro]
# See: https://github.com/Blaizzy/mlx-audio/issues/648
# misaki/phonemizer incompatibility is auto-patched at startup
deps = ["misaki", "num2words", "spacy", "phonemizer", "espeakng-loader"]
# System packages installed via brew (checked by binary name on PATH)
brew = ["espeak-ng"]
