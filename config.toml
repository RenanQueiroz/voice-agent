[general]
input_mode = "vad"                 # "push_to_talk" or "vad"
enable_mcp = true                  # load MCP tool servers from mcp_servers.toml

# ── Local server endpoints ────────────────────────────────
# Only consulted for roles whose active model is local. You can leave these
# even if you're using cloud models — they're lazy-validated.
[local]
stt_url = "http://localhost:9000"  # whisper-server
tts_url = "http://localhost:8000"  # mlx-audio
llm_url = "http://localhost:8080"  # mlx-vlm / mlx-lm / llama-server

# ── STT catalog ───────────────────────────────────────────
# Each [[stt]] entry is a picker option. The first entry is the default when
# preferences.toml doesn't exist. The "(local)" / "(cloud)" suffix is added
# to the display name automatically from `provider` — don't include it in `name`.
[[stt]]
name     = "whisper-turbo"
provider = "local"
model    = "large-v3-turbo-q5_0"   # whisper.cpp model file suffix (see setup-whispercpp.sh)

[[stt]]
name     = "gpt-4o-transcribe"
provider = "cloud"
model    = "gpt-4o-transcribe"

# ── LLM catalog ───────────────────────────────────────────
# Local entries must set `server` (mlx-vlm / mlx-lm / llamacpp). `audio_input`
# lets the LLM accept audio directly, skipping STT latency; only meaningful
# when BOTH the STT and LLM are local (they share the same whisper audio
# buffer — see providers.py).
[[llm]]
name        = "gemma-4-e4b-it (llamacpp)"
provider    = "local"
server      = "llamacpp"
model       = "gemma-4-e4b-it"     # must match a section name in the preset
preset      = "models.ini"
audio_input = true

[[llm]]
name            = "gemma-4-e4b-it (mlx-vlm)"
provider        = "local"
server          = "mlx-vlm"
model           = "mlx-community/gemma-4-e4b-it-4bit"
audio_input     = true
kv_bits         = 3.5
kv_quant_scheme = "turboquant"

[[llm]]
name     = "gemma-3-4b-it (mlx-lm)"
provider = "local"
server   = "mlx-lm"
model    = "mlx-community/gemma-3-4b-it-4bit"

[[llm]]
name     = "gpt-5.4-mini"
provider = "cloud"
model    = "gpt-5.4-mini"
# OpenAI-hosted tools. Allowed: "web_search", "code_interpreter", "file_search".
# These only work with cloud LLMs (provider = "cloud"). Leave empty to disable.
# hosted_tools = ["web_search", "code_interpreter"]
# For hosted_tools = ["file_search", ...], add:
#   file_search_vector_stores = ["vs_abc123"]
#   file_search_max_results   = 5

# ── TTS catalog ───────────────────────────────────────────
[[tts]]
name     = "kokoro"
provider = "local"
model    = "mlx-community/Kokoro-82M-bf16"
voice    = "af_heart"

[[tts]]
name     = "chatterbox-turbo"
provider = "local"
model    = "mlx-community/chatterbox-turbo-4bit"

[[tts]]
name     = "gpt-4o-mini-tts"
provider = "cloud"
model    = "gpt-4o-mini-tts"
voice    = "alloy"

# ── VAD ───────────────────────────────────────────────────
[vad]
# Speech probability threshold (0.0-1.0). Higher = fewer false triggers.
threshold  = 0.5
# Milliseconds of silence after speech before triggering processing.
silence_ms = 500

# ── Display ───────────────────────────────────────────────
[display]
show_transcript = true
show_metrics    = true

# ── Audio ─────────────────────────────────────────────────
[audio]
sample_rate = 24000

# ── Agent ─────────────────────────────────────────────────
[agent]
instructions = """
You are a friendly and helpful voice assistant. Today is {date}. Be warm and conversational.
Your output is read aloud by a TTS model. Never use formatting that cannot be spoken:
no bullet points, no numbered lists, no asterisks, no bold/italic, no markdown, no emojis, no headers.
Use plain sentences only. When listing things, say them in a natural sentence.
If you don't know the answer, say you don't know.

IMPORTANT:
Before calling a tool, ALWAYS say a short sentence about what you're about to do, and then do the tool call, BOTH PART OF THE SAME TURN.
Tool calls can take a while to run, so we need to give the user some feedback before they need to wait.
For example, say "Let me check that for you" before a search tool call, or "I'll pull up the calendar" before a calendar tool call.
Do this as many times as needed for as many tool calls as needed until you are able to complete the user's request. Only then you can end the turn.
DO NOT END THE TURN UNTIL YOU HAVE COMPLETED THE USER'S REQUEST, INCLUDING ALL NECESSARY TOOL CALLS.
"""

# Phrase spoken while waiting for tool calls as fallback if the model hasn't generated any text. Leave empty to disable.
tool_call_filler = "Give me just a moment."

# Model-specific instruction snippets. Keys are substring patterns matched against
# active model names (STT, TTS, LLM). Matching snippets are appended to instructions.
[agent.model-instructions]
chatterbox = """
Use the following tags to express non-speech sounds or expressions:

Tag	Description
[clear throat]	Throat clearing sound
[sigh]	Sighing expression
[shush]	Shushing sound
[cough]	Coughing sound
[groan]	Groaning expression
[sniff]	Sniffing sound
[gasp]	Gasping expression
[chuckle]	Light chuckling
[laugh]	Laughter
"""
