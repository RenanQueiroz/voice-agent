[general]
voice_mode = "local"
input_mode = "vad"

[cloud]
stt_model = "gpt-4o-transcribe"
tts_model = "gpt-4o-mini-tts"
llm_model = "gpt-4o-mini"
tts_voice = "alloy"

[local]
stt_model = "mlx-community/whisper-large-v3-turbo-asr-8bit"
#tts_model = "mlx-community/Kokoro-82M-bf16"
tts_model = "mlx-community/chatterbox-turbo-4bit"
#llm_model = "mlx-community/gemma-4-e4b-it-4bit"
llm_model = "mlx-community/gpt-oss-20b-MXFP4-Q4"
#tts_voice = "af_heart"
audio_url = "http://localhost:8000"
vlm_url = "http://localhost:8080"

[vad]
# 0-3: higher = more aggressive at filtering non-speech, but more false positives
# from ambient noise. 2 is a good balance for most environments.
aggressiveness = 2
# Milliseconds of silence after speech before triggering processing.
# Lower = more responsive, but may cut off mid-pause. 500ms is conversational.
silence_ms = 500
# Minimum RMS energy to count a frame as speech (even if webrtcvad says yes).
# Filters out low-level ambient noise. Run debug_vad.py to calibrate for your mic.
# Typical: ambient ~10, speech 50-500+.
energy_threshold = 60

[display]
# Show real-time transcription of user speech and agent response in the console.
show_transcript = true
# Show performance metrics (STT, LLM, TTS timing) after each response.
show_metrics = true

[agent]
instructions = """
You are a helpful voice assistant. Be concise and conversational. 
Avoid things that cannot be expressed in speech, like tables, lists, emojis, etc. 
If you don't know the answer, say you don't know.
Use the following tags to express non-speech sounds or expressions:

Tag	Description
[clear throat]	Throat clearing sound
[sigh]	Sighing expression
[shush]	Shushing sound
[cough]	Coughing sound
[groan]	Groaning expression
[sniff]	Sniffing sound
[gasp]	Gasping expression
[chuckle]	Light chuckling
[laugh]	Laughter
"""

[audio]
sample_rate = 24000
