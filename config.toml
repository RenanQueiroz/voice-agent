[general]
voice_mode = "local"
input_mode = "vad"
# Enable MCP tool servers (defined in mcp_servers.toml). Some models may not support tool use.
enable_mcp = true

[cloud]
stt_model = "gpt-4o-transcribe"
tts_model = "gpt-4o-mini-tts"
llm_model = "gpt-4o-mini"
tts_voice = "alloy"

[local]
stt_model = "large-v3-turbo-q5_0"      # whisper.cpp model name (see setup-whisper.sh for supported list)
stt_url = "http://localhost:9000"  # whisper-server endpoint
tts_model = "mlx-community/Kokoro-82M-bf16"
#tts_model = "mlx-community/chatterbox-turbo-4bit"
tts_voice = "af_heart"
llm_server = "llamacpp"          # "mlx-vlm", "mlx-lm", or "llamacpp"
llm_url = "http://localhost:8080"
audio_url = "http://localhost:8000"

[local.mlx-vlm]
llm_model = "mlx-community/gemma-4-e4b-it-4bit"
kv_bits = 3.5
kv_quant_scheme = "turboquant"

[local.mlx-lm]
llm_model = "mlx-community/gemma-3-4b-it-4bit"

[local.llamacpp]
llm_model = "gemma-4-e4b-it"    # model name for API requests (must match models.ini)
#lllm_model = "gpt-oss-20b-low"
preset = "models.ini"            # path to llama-server --models-preset INI file

[vad]
# 0-3: higher = more aggressive at filtering non-speech, but more false positives
# from ambient noise. 2 is a good balance for most environments.
aggressiveness = 2
# Milliseconds of silence after speech before triggering processing.
# Lower = more responsive, but may cut off mid-pause. 500ms is conversational.
silence_ms = 500
# Minimum RMS energy to count a frame as speech (even if webrtcvad says yes).
# Filters out low-level ambient noise. Run debug_vad.py to calibrate for your mic.
# Typical: ambient ~10, speech 50-500+.
energy_threshold = 60

[display]
# Show real-time transcription of user speech and agent response in the console.
show_transcript = true
# Show performance metrics (STT, LLM, TTS timing) after each response.
show_metrics = true

[agent]
instructions = """
You are a helpful voice assistant. Today is {date}. Be concise and conversational.
Your output is read aloud by a TTS model. Never use formatting that cannot be spoken:
no bullet points, no numbered lists, no asterisks, no bold/italic, no markdown, no emojis, no headers.
Use plain sentences only. When listing things, say them in a natural sentence.
If you don't know the answer, say you don't know.

IMPORTANT: Before calling a tool, say a short sentence about what you're about to do. 
Tool calls can take a while to run, so we need to give the user some feedback before they need to wait. 
For example, say "Let me check that for you" before a search tool call, or "I'll pull up the calendar" before a calendar tool call.
"""

# Phrase spoken while waiting for tool calls as fallback if the model hasn't generated any text. Leave empty to disable.
tool_call_filler = "Give me just a moment."

# Model-specific instruction snippets. Keys are substring patterns matched against
# active model names (STT, TTS, LLM). Matching snippets are appended to instructions.
[agent.model-instructions]
chatterbox = """
Use the following tags to express non-speech sounds or expressions:

Tag	Description
[clear throat]	Throat clearing sound
[sigh]	Sighing expression
[shush]	Shushing sound
[cough]	Coughing sound
[groan]	Groaning expression
[sniff]	Sniffing sound
[gasp]	Gasping expression
[chuckle]	Light chuckling
[laugh]	Laughter
"""

[audio]
sample_rate = 24000
