# Model catalogs. Each [[stt]] / [[llm]] / [[tts]] entry is a picker option
# that appears in the Switch modal (press `S` in the app). The first entry
# for each role is used as the default when preferences.toml doesn't exist
# (or references a name that's no longer in the catalog).
#
# The "(local)" / "(cloud)" suffix is added to the display name automatically
# from `provider` — don't include it in `name`.
#
# Per-model `api_key` override (cloud entries only): set this when one vendor
# key is rate-limited or scoped to a subset of models — e.g. a legacy Gemini
# key that still works on the LLM endpoint alongside a newer key for TTS.
# Use `${VAR_NAME}` to reference an env var so real secrets stay out of this
# committed file:
#
#   [[llm]]
#   name     = "gemini-legacy-key"
#   provider = "cloud"
#   vendor   = "gemini"
#   model    = "gemini-3.1-flash-lite-preview"
#   api_key  = "${GEMINI_API_KEY_LEGACY}"

# ── STT catalog ───────────────────────────────────────────
[[stt]]
name     = "whisper-turbo"
provider = "local"
model    = "large-v3-turbo-q5_0"   # whisper.cpp model file suffix (see setup-whispercpp.sh)

[[stt]]
name     = "gpt-4o-transcribe"
provider = "cloud"
model    = "gpt-4o-transcribe"

# ── LLM catalog ───────────────────────────────────────────
# Local entries must set `server` (mlx-vlm / mlx-lm / llamacpp). `audio_input`
# lets the LLM accept audio directly, skipping STT latency; only meaningful
# when BOTH the STT and LLM are local (they share the same whisper audio
# buffer — see providers.py).
[[llm]]
name        = "gemma-4-e4b-it (llamacpp)"
provider    = "local"
server      = "llamacpp"
model       = "gemma-4-e4b-it"     # must match a section alias in the preset
preset      = "llamacpp-models.ini"
audio_input = true

[[llm]]
name            = "gemma-4-e4b-it (mlx-vlm)"
provider        = "local"
server          = "mlx-vlm"
model           = "unsloth/gemma-4-E4B-it-UD-MLX-4bit"
audio_input     = true
kv_bits         = 3.5
kv_quant_scheme = "turboquant"

[[llm]]
name     = "gemma-3-4b-it (mlx-lm)"
provider = "local"
server   = "mlx-lm"
model    = "mlx-community/gemma-3-4b-it-4bit"

[[llm]]
name     = "gpt-5.4-mini"
provider = "cloud"
model    = "gpt-5.4-mini"
# Skip server-side thinking before the first token. On GPT-5 reasoning models
# the default is `medium`, which makes TTFT unacceptable for voice. Accepts:
# "none" | "minimal" | "low" | "medium" | "high" | "xhigh". Bump this up if
# you want the model to think harder on complex prompts.
reasoning_effort = "none"
# OpenAI-hosted tools. Allowed: "web_search", "code_interpreter", "file_search".
# Only valid on OpenAI cloud LLMs — i.e. `provider = "cloud"` with either no
# `vendor` field or `vendor = "openai"`. They do NOT work with Gemini or any
# other vendor (the app rejects this at startup). Leave empty to disable.
# These cannot be used with thinking level set to "minimal".
hosted_tools = ["web_search", "code_interpreter"]
# For hosted_tools = ["file_search", ...], add:
#   file_search_vector_stores = ["vs_abc123"]
#   file_search_max_results   = 5

# Gemini via its OpenAI-compatible chat endpoint. Needs GEMINI_API_KEY in .env.
[[llm]]
name     = "gemini-3.1-flash-lite-preview"
provider = "cloud"
vendor   = "gemini"
model    = "gemini-3.1-flash-lite-preview"
# Gemini 3 preview models reason before emitting tokens; with the default
# budget TTFT on this model is ~16s for voice-sized prompts. "minimal" drops
# it to ~1s. Set to "low" or higher only if you need reasoning quality.
reasoning_effort = "minimal"
# Gemini OpenAI-compatible endpoint doesn't support the newer keys yet (starting with AQ.), so we need a separate legacy key here.
# Details: https://discuss.ai.google.dev/t/new-aq-prefix-api-keys-fail-on-openai-compatible-endpoints-with-multiple-authentication-credentials-received/140545
api_key  = "${GEMINI_API_KEY_LEGACY}"

# ── TTS catalog ───────────────────────────────────────────
# Local TTS entries also accept:
# `streaming_interval` (seconds) — the window mlx-audio buffers before emitting each audio chunk. 
# Defaults to 2.0 (the server's own default); lower values shorten first-byte latency but tend to
# cause glitchy audio in practice. Override per-entry if you want to try it.
# `temperature` (0.0-1.0) — tames the sampler. 
# Lower = more consistent voice across turns, higher = more variation (server default is 0.7).
[[tts]]
name     = "kokoro"
provider = "local"
model    = "mlx-community/Kokoro-82M-bf16"
voice    = "af_heart"

[[tts]]
name     = "chatterbox-turbo"
provider = "local"
model    = "mlx-community/chatterbox-turbo-4bit"

# CSM supports voice cloning. Add `ref_audio` (path to a short WAV reference,
# resolved relative to the project root) and `ref_text` (its transcript) to
# clone that voice. Both fields must be set together; they only apply on local
# TTS entries (mlx-audio). See models/tts/csm.md in the mlx-audio repo.
[[tts]]
name      = "csm"
provider  = "local"
model     = "mlx-community/csm-1b-8bit"
ref_audio = "voices/gemini-sulafat.wav"
ref_text  = "Hello there! I'm here to help you navigate whatever you're working on today. If things feel a bit complicated, don't worry, we'll figure it out together, one step at a time. Just let me know what you need, and I'll be right here to assist you."

# Qwen3-TTS supports an `instruct` string that steers pronunciation, tone,
# pacing, and emotion. Ignored by models that don't support it (so it's safe
# to leave on). See the mlx-audio web-ui-api-server docs for examples.
[[tts]]
name        = "qwen-3-tts-0.6b"
provider    = "local"
model       = "mlx-community/Qwen3-TTS-12Hz-0.6B-CustomVoice-bf16"
voice       = "Sohee"
instruct    = "Speak in a warm, friendly, conversational tone at a natural pace."
temperature = 0.3

[[tts]]
name     = "gpt-4o-mini-tts"
provider = "cloud"
model    = "gpt-4o-mini-tts"
voice    = "marin"

# Gemini TTS via native generateContent API (not OpenAI-compatible — we wrap it).
# Needs GEMINI_API_KEY in .env. 
# Voices: See https://ai.google.dev/gemini-api/docs/speech-generation#voices for the full list.
[[tts]]
name     = "gemini-3.1-flash-tts-preview"
provider = "cloud"
vendor   = "gemini"
model    = "gemini-3.1-flash-tts-preview"
voice    = "Sulafat"
